<style>

  .scrollbar-thin::-webkit-scrollbar-thumb { background: #C9A84C; border-radius: 10px; }

  .fade-in { animation: fadeIn .35s ease; }

<body class="min-h-screen">

<div id="toast-root" class="fixed bottom-24 left-0 right-0 z-50 flex flex-col items-center gap-2 pointer-events-none"></div>

<div id="app" class="max-w-md mx-auto min-h-screen relative pb-24"></div>

<script>
/* ============================================================
   MOCK "SUPABASE" DATA LAYER (localStorage-backed)
   Mirrors the schema described in the spec. Swap with real
   Supabase client calls (supabase-js) for production use.
   ============================================================ */
const DB_KEY = 'lrbc_db';
const SESSION_KEY = 'lrbc_session';
const ADMIN_KEY = 'lrbc_admin_session';

function todayISO(){ return new Date().toISOString().slice(0,10); }
function uid(){ return 'id-' + Math.random().toString(36).slice(2,10); }
function ghTime(ts){
  const d = new Date(ts);
  return d.toLocaleString('en-GH', { timeZone:'Africa/Accra', day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
}
function timeAgo(ts){
  const diff = (Date.now() - new Date(ts).getTime())/1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60)+'m ago';
  if (diff < 86400) return Math.floor(diff/3600)+'h ago';
  return Math.floor(diff/86400)+'d ago';
}
function monthKey(d=new Date()){ return d.toISOString().slice(0,7); }
function daysInMonth(d=new Date()){ return new Date(d.getFullYear(), d.getMonth()+1, 0).getDate(); }

const AFFIRMATION_TEMPLATES = [
"{name} is blessed and highly favoured. Today God is opening new doors for you.",
"{name}, you are a daughter of the King — walk today in that confidence.",
"God's mercy is new for {name} this morning. Receive it fully.",
"{name}, your faithfulness is seen by Heaven. Keep pressing on.",
"Today, {name}, let go of worry — your Father already has it covered.",
"{name}, you are stronger than yesterday because His grace carried you here.",
"The joy of the Lord is {name}'s strength today.",
"{name}, be still — God is fighting battles you don't even see.",
"Your prayers matter, {name}. Heaven is listening.",
"{name}, today is a gift wrapped in grace. Unwrap it with gratitude.",
"God has good plans for {name} — plans of peace, not of harm.",
"{name}, you carry light wherever you go today.",
"Rest in this, {name}: you are deeply and unconditionally loved.",
"{name}, the same God who began this in you will finish it.",
"Today {name} walks by faith, not by sight — and that pleases God.",
"{name}, your obedience this season is planting seeds you'll harvest later.",
"God sees the quiet faithfulness of {name}. It is never wasted.",
"{name}, may today be filled with unexpected kindness and grace.",
"You are not alone today, {name} — Emmanuel goes before you.",
"{name}, let today's reading be a lamp for your feet.",
"Your worship, {name}, is a fragrant offering before the Lord today.",
"{name}, healing is happening in you even when you can't see it yet.",
"Today, {name}, choose gratitude — it will guard your heart.",
"{name}, the Lord is your shepherd; you shall not want today.",
"Be encouraged, {name} — your breakthrough season has begun.",
"{name}, God's word is alive in you today, doing a deep work.",
"You are seen, {name}, and you are deeply cherished by God.",
"{name}, let His peace, which surpasses understanding, guard your heart today.",
"Today {name} is reminded: greater is He that is in you.",
"{name}, your story is still being written by a faithful God."
];

function defaultDB(){
  const today = todayISO();
  const month = monthKey();
  return {
    members: [
      { id:'m-admin0', membership_code:'LR001', name:'Joanita Mensah', email:'joanita@example.com', phone:'', location:'Accra', attendance_score:90, years_attended:'3', pin:null, first_login:true, created_at: new Date().toISOString() },
      { id:'m-2', membership_code:'LR002', name:'Abena Owusu', email:'', phone:'', location:'Tema', attendance_score:80, years_attended:'2', pin:'1234', first_login:false, created_at: new Date().toISOString() },
      { id:'m-3', membership_code:'LR003', name:'Grace Addo', email:'', phone:'', location:'Kumasi', attendance_score:95, years_attended:'5', pin:'1234', first_login:false, created_at: new Date().toISOString() },
    ],
    monthly_readings: [
      { id:'r-today', month, book:'Psalms', day: today, chapter:'23', verses:'1-6',
        full_text: "1 The Lord is my shepherd; I shall not want.\n2 He maketh me to lie down in green pastures: he leadeth me beside the still waters.\n3 He restoreth my soul: he leadeth me in the paths of righteousness for his name's sake.\n4 Yea, though I walk through the valley of the shadow of death, I will fear no evil: for thou art with me; thy rod and thy staff they comfort me.\n5 Thou preparest a table before me in the presence of mine enemies: thou anointest my head with oil; my cup runneth over.\n6 Surely goodness and mercy shall follow me all the days of my life: and I will dwell in the house of the Lord for ever.",
        audio_url: null, created_by: 'm-admin0', created_at: new Date().toISOString() }
    ],
    reading_completions: [],
    comments: [],
    reactions: [],
    replies: [],
    streaks: [
      { id:'s-1', member_id:'m-admin0', current_streak:4, longest_streak:9, last_active_date: null, total_days_completed: 12 },
      { id:'s-2', member_id:'m-2', current_streak:2, longest_streak:6, last_active_date: null, total_days_completed: 8 },
      { id:'s-3', member_id:'m-3', current_streak:9, longest_streak:21, last_active_date: null, total_days_completed: 30 },
    ],
    monthly_scores: [],
    monthly_winners: [],
    badges: [],
    prayer_journal: [],
    prayer_wall: [],
    prayer_wall_joins: [],
    shoutouts: [],
    broadcasts: [],
    affirmations: AFFIRMATION_TEMPLATES.map((t,i)=>{
      const d = new Date(); d.setDate(d.getDate()-15+i);
      return { id:'aff-'+i, template:t, date: d.toISOString().slice(0,10) };
    })
  };
}

function loadDB(){
  let raw = localStorage.getItem(DB_KEY);
  if (!raw){ const db = defaultDB(); localStorage.setItem(DB_KEY, JSON.stringify(db)); return db; }
  return JSON.parse(raw);
}
function saveDB(db){ localStorage.setItem(DB_KEY, JSON.stringify(db)); }

let db = loadDB();

function findMember(query){
  query = query.trim().toLowerCase();
  return db.members.find(m => m.name.toLowerCase() === query || m.membership_code.toLowerCase() === query)
      || db.members.find(m => m.name.toLowerCase().includes(query) || m.membership_code.toLowerCase().includes(query));
}
function getSession(){ try { return JSON.parse(localStorage.getItem(SESSION_KEY)); } catch(e){ return null; } }
function setSession(s){ localStorage.setItem(SESSION_KEY, JSON.stringify(s)); }
function clearSession(){ localStorage.removeItem(SESSION_KEY); }
function getAdminSession(){ return localStorage.getItem(ADMIN_KEY) === '1'; }

function ensureStreak(memberId){
  let s = db.streaks.find(s=>s.member_id===memberId);
  if (!s){ s = { id: uid(), member_id: memberId, current_streak:0, longest_streak:0, last_active_date:null, total_days_completed:0 }; db.streaks.push(s); }
  return s;
}
function ensureMonthlyScore(memberId, month){
  let sc = db.monthly_scores.find(s=>s.member_id===memberId && s.month===month);
  if (!sc){ sc = { id: uid(), member_id:memberId, month, comment_points:0, reaction_received_points:0, reaction_given_points:0, weekly_completion_bonus:0, streak_bonus:0, full_month_bonus:0, total:0 }; db.monthly_scores.push(sc); }
  return sc;
}
function recalcTotal(sc){
  sc.total = sc.comment_points + sc.reaction_received_points + sc.reaction_given_points + sc.weekly_completion_bonus + sc.streak_bonus + sc.full_month_bonus;
}
function awardBadge(memberId, badge_type){
  if (db.badges.find(b=>b.member_id===memberId && b.badge_type===badge_type)) return false;
  db.badges.push({ id: uid(), member_id: memberId, badge_type, earned_at: new Date().toISOString() });
  return true;
}

function toast(msg, type='success'){
  const root = document.getElementById('toast-root');
  const el = document.createElement('div');
  const color = type==='success' ? 'bg-success' : 'bg-red';
  el.className = `toast ${color} text-white px-5 py-3 rounded-xl shadow-lg text-sm font-medium max-w-xs text-center`;
  el.textContent = msg;
  root.appendChild(el);
  setTimeout(()=>el.remove(), 2700);
}

/* ============================================================
   ROUTER
   ============================================================ */
const routes = {};
function route(path, fn){ routes[path] = fn; }
function navigate(path){ location.hash = path; }
function currentPath(){ return (location.hash || '#/login').slice(1) || '/login'; }

window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', render);

function render(){
  saveDB(db);
  const path = currentPath();
  const app = document.getElementById('app');
  app.innerHTML = '';

  const protectedPaths = ['/dashboard','/reading','/prayer','/journey','/leaderboard'];
  const session = getSession();
  if (protectedPaths.some(p=>path.startsWith(p)) && !session){ navigate('/login'); return; }
  if (path.startsWith('/admin') && path !== '/admin/login' && !getAdminSession()){ navigate('/admin/login'); return; }

  let matched = routes[path];
  if (!matched){
    const base = '/' + path.split('/')[1];
    matched = routes[base];
  }
  if (!matched){ matched = routes['/login']; }
  const content = matched(session);
  app.appendChild(content);
  if (protectedPaths.some(p=>path.startsWith(p))){
    app.appendChild(bottomNav(path, session));
  }
}

function el(html){
  const t = document.createElement('template');
  t.innerHTML = html.trim();
  return t.content.firstChild;
}

/* ============================================================
   SHARED UI
   ============================================================ */
function bottomNav(path, session){
  const streak = ensureStreak(session.id).current_streak;
  const items = [
    { p:'/dashboard', icon:'🏠', label:'Home' },
    { p:'/reading', icon:'📖', label:'Reading' },
    { p:'/prayer', icon:'🙏', label:'Prayer' },
    { p:'/journey', icon:'📈', label:'Journey' },
    { p:'/leaderboard', icon:'🏆', label:'Leaderboard' },
  ];
  const nav = el(`<nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-light shadow-[0_-4px_20px_rgba(106,27,154,0.08)] flex justify-between px-2 py-2 z-40"></nav>`);
  items.forEach(it=>{
    const active = path.startsWith(it.p);
    const btn = el(`
      <button class="nav-item flex-1 flex flex-col items-center gap-0.5 py-1.5 rounded-xl transition ${active?'active':'text-muted'}">
        <span class="nav-ic text-xl relative transition-transform">
          ${it.icon}
          ${it.p==='/dashboard' && streak>0 ? `<span class="absolute -top-1 -right-2 bg-gold text-[10px] text-white rounded-full px-1 leading-tight">${streak}</span>` : ''}
        </span>
        <span class="text-[10px] font-medium">${it.label}</span>
      </button>`);
    btn.onclick = ()=> navigate(it.p);
    nav.appendChild(btn);
  });
  return nav;
}

function header(title, opts={}){
  return el(`
    <div class="px-6 pt-8 pb-4 ${opts.bg||''}">
      <h1 class="font-display text-3xl font-semibold text-dark">${title}</h1>
      ${opts.sub? `<p class="text-muted text-sm mt-1">${opts.sub}</p>`:''}
    </div>`);
}

/* ============================================================
   LOGIN / PIN FLOW
   ============================================================ */
route('/login', () => {
  const wrap = el(`
    <div class="min-h-screen flex flex-col items-center justify-center px-8 fade-in">
      <div class="w-16 h-16 rounded-full bg-primary flex items-center justify-center text-2xl text-white shadow-soft mb-6">✝️</div>
      <h1 class="font-display text-4xl font-semibold text-dark text-center">Welcome to the<br/>LR Bible Challenge</h1>
      <p class="text-muted text-center mt-3 mb-8 text-sm">Enter your name or LR code to begin</p>
      <div class="w-full card p-5">
        <input id="login-input" type="text" placeholder="Name or LR code" class="w-full border border-light rounded-xl px-4 py-3 outline-none focus:border-primary text-ink" />
        <button id="login-btn" class="mt-4 w-full bg-primary hover:bg-dark text-white rounded-xl py-3 font-semibold transition">Continue</button>
        <p id="login-err" class="text-red text-xs mt-3 hidden"></p>
      </div>
      <button id="admin-link" class="text-muted text-xs mt-8 underline">Admin Portal</button>
    </div>`);

  wrap.querySelector('#login-btn').onclick = () => {
    const val = wrap.querySelector('#login-input').value;
    const err = wrap.querySelector('#login-err');
    if (!val.trim()){ err.textContent = 'Please enter your name or LR code'; err.classList.remove('hidden'); return; }
    const member = findMember(val);
    if (!member){ err.textContent = "We couldn't find that member. Check spelling or ask an admin."; err.classList.remove('hidden'); return; }
    sessionStorage.setItem('lrbc_pending_member', member.id);
    navigate(member.pin ? '/pin-entry' : '/pin-setup');
  };
  wrap.querySelector('#admin-link').onclick = () => navigate('/admin/login');
  return wrap;
});

function pinScreen({title, sub, onSubmit, confirm=false}){
  const wrap = el(`
    <div class="min-h-screen flex flex-col items-center justify-center px-8 fade-in">
      <h2 class="font-display text-3xl font-semibold text-dark text-center">${title}</h2>
      <p class="text-muted text-center mt-2 mb-8 text-sm">${sub}</p>
      <div class="flex gap-3 mb-2" id="dots"></div>
      <p id="pin-err" class="text-red text-xs mt-2 hidden"></p>
      <div class="grid grid-cols-3 gap-4 mt-8 w-full max-w-xs">
        ${[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(n=>`<button data-key="${n}" class="key h-16 rounded-2xl bg-white shadow-softer text-xl font-semibold text-dark ${n===''?'invisible':''}">${n}</button>`).join('')}
      </div>
    </div>`);
  let pin = '';
  const dotsEl = wrap.querySelector('#dots');
  function renderDots(){
    dotsEl.innerHTML = '';
    for (let i=0;i<4;i++){
      dotsEl.appendChild(el(`<div class="pin-dot ${i<pin.length?'filled':''}"></div>`));
    }
  }
  renderDots();
  wrap.querySelectorAll('.key').forEach(k=>{
    k.onclick = () => {
      const key = k.dataset.key;
      if (key === '⌫'){ pin = pin.slice(0,-1); }
      else if (key !== '' && pin.length < 4){ pin += key; }
      renderDots();
      if (pin.length === 4){
        setTimeout(()=> onSubmit(pin, wrap.querySelector('#pin-err'), ()=>{ pin=''; renderDots(); }), 150);
      }
    };
  });
  return wrap;
}

route('/pin-setup', () => {
  let firstPin = null;
  const memberId = sessionStorage.getItem('lrbc_pending_member');
  const member = db.members.find(m=>m.id===memberId);
  if (!member) { navigate('/login'); return el('<div></div>'); }

  function step1(){
    return pinScreen({
      title: `Hi ${member.name.split(' ')[0]}, set a PIN`,
      sub: 'Choose a 4-digit PIN to protect your account',
      onSubmit: (pin, errEl, reset) => {
        firstPin = pin;
        const container = document.getElementById('app');
        container.replaceChildren(step2());
      }
    });
  }
  function step2(){
    const w = pinScreen({
      title: 'Confirm your PIN',
      sub: 'Enter the same 4 digits again',
      onSubmit: (pin, errEl, reset) => {
        if (pin !== firstPin){
          errEl.textContent = "PINs don't match — try again.";
          errEl.classList.remove('hidden');
          reset();
          return;
        }
        member.pin = pin;
        const isFirst = member.first_login;
        saveDB(db);
        setSession({ id: member.id, name: member.name, membership_code: member.membership_code });
        if (isFirst) awardBadge(member.id, 'Welcome');
        toast('PIN set successfully 💜');
        navigate('/dashboard');
      }
    });
    const main = document.createElement('div');
    main.appendChild(w);
    return main.firstChild;
  }
  return step1();
});

route('/pin-entry', () => {
  const memberId = sessionStorage.getItem('lrbc_pending_member');
  const member = db.members.find(m=>m.id===memberId);
  if (!member) { navigate('/login'); return el('<div></div>'); }
  return pinScreen({
    title: `Welcome back, ${member.name.split(' ')[0]}`,
    sub: 'Enter your 4-digit PIN',
    onSubmit: (pin, errEl, reset) => {
      if (pin !== member.pin){
        errEl.textContent = 'Incorrect PIN — try again.';
        errEl.classList.remove('hidden');
        reset();
        return;
      }
      setSession({ id: member.id, name: member.name, membership_code: member.membership_code });
      toast(`Welcome back, ${member.name.split(' ')[0]}! 💜`);
      navigate('/dashboard');
    }
  });
});

function notYouLink(){
  const a = el(`<button class="text-muted text-xs underline">Not you?</button>`);
  a.onclick = () => { clearSession(); navigate('/login'); };
  return a;
}

/* ============================================================
   DASHBOARD
   ============================================================ */
route('/dashboard', (session) => {
  const member = db.members.find(m=>m.id===session.id);
  const streak = ensureStreak(member.id);
  const month = monthKey();
  const dim = daysInMonth();
  const completedThisMonth = db.reading_completions.filter(c=>c.member_id===member.id && c.month===month).length;

  const wrap = el(`<div class="fade-in pb-4"></div>`);
  const headerEl = header('Dashboard');
  const topRow = el(`<div class="flex justify-end px-6 -mt-2 mb-2"></div>`);
  topRow.appendChild(notYouLink());

  wrap.appendChild(headerEl);
  wrap.appendChild(topRow);

  const body = el(`<div class="px-6 space-y-5"></div>`);

  // First login welcome
  if (member.first_login){
    const banner = el(`
      <div class="card border-2 border-gold p-4 flex justify-between items-start gap-3">
        <p class="text-sm font-medium text-dark">Welcome to the LR Bible Challenge family, ${member.name.split(' ')[0]}! 🎉</p>
        <button class="text-muted text-lg leading-none" id="dismiss-welcome">×</button>
      </div>`);
    banner.querySelector('#dismiss-welcome').onclick = () => { member.first_login = false; saveDB(db); render(); };
    body.appendChild(banner);
  }

  // Broadcasts
  const activeBroadcasts = db.broadcasts.filter(b => new Date(b.expires_at) > new Date());
  activeBroadcasts.forEach(b=>{
    const banner = el(`
      <div class="card bg-light border border-primary/20 p-4 flex justify-between items-start gap-3">
        <p class="text-sm text-dark">📣 ${b.message}</p>
        <button class="text-muted text-lg leading-none dismiss-bc">×</button>
      </div>`);
    banner.querySelector('.dismiss-bc').onclick = () => { banner.remove(); };
    body.appendChild(banner);
  });

  // Affirmation
  const aff = db.affirmations.find(a=>a.date === todayISO());
  const affText = (aff ? aff.template : AFFIRMATION_TEMPLATES[0]).replace('{name}', member.name.split(' ')[0]);
  body.appendChild(el(`
    <div class="card border-2 border-gold p-5 text-center">
      <p class="text-xs uppercase tracking-wide text-gold font-semibold mb-2">Today's Word for You</p>
      <p class="font-display text-2xl text-dark leading-snug">${affText}</p>
    </div>`));

  // Streak + progress
  body.appendChild(el(`
    <div class="card p-5">
      <div class="flex justify-between items-center mb-3">
        <div>
          <p class="text-2xl font-bold text-primary">🔥 ${streak.current_streak} day streak</p>
          <p class="text-muted text-xs mt-1">Longest streak: ${streak.longest_streak} days</p>
        </div>
      </div>
      <div class="flex justify-between text-xs text-muted mb-1">
        <span>This month</span><span>${completedThisMonth}/${dim} days</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${Math.min(100, completedThisMonth/dim*100)}%"></div></div>
    </div>`));

  // Nudge
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
  const yISO = yesterday.toISOString().slice(0,10);
  if (streak.last_active_date && streak.last_active_date < yISO){
    body.appendChild(el(`
      <div class="card border-2 border-gold bg-light p-4">
        <p class="text-sm font-medium text-dark">You missed yesterday — your streak is at risk today! Open today's reading 💜</p>
      </div>`));
  } else if (streak.last_active_date === yISO){
    body.appendChild(el(`
      <div class="card bg-light p-4">
        <p class="text-sm font-medium text-dark">You're on track! Don't forget today's reading 💜</p>
      </div>`));
  }

  // Monthly winner banner
  const lastWinner = [...db.monthly_winners].filter(w=>w.announced).sort((a,b)=>b.month.localeCompare(a.month))[0];
  if (lastWinner){
    const winnerMember = db.members.find(m=>m.id===lastWinner.member_id);
    const expires = lastWinner.announcement_expires ? new Date(lastWinner.announcement_expires) : null;
    if (winnerMember && (!expires || expires >= new Date())){
      body.appendChild(el(`

route('/reading', (session) => {

  const reading = db.monthly_readings.find(r=>r.day===today);
  const wrap = el(`<div class="fade-in"></div>`);

    body.appendChild(el(`<div class="card p-6 text-center text-muted">No reading has been posted for today yet — check back soon 💜</div>`));
    wrap.appendChild(body);
    return wrap;
  }

  const completed = db.reading_completions.find(c=>c.member_id===member.id && c.reading_id===reading.id);

  // scripture text card with tappable verses
  const verseLines = reading.full_text.split('\n').filter(Boolean);
  const scriptureCard = el(`<div class="card p-5"><div id="verses" class="space-y-2 leading-relaxed text-ink"></div></div>`);
  const versesEl = scriptureCard.querySelector('#verses');
  let selectedQuote = null;
  verseLines.forEach(line => {
    const match = line.match(/^(\d+)\s+(.*)/);
    const num = match ? match[1] : '';
    const text = match ? match[2] : line;
    const span = el(`<p class="cursor-pointer rounded-lg px-2 py-1 transition hover:bg-light" data-num="${num}"><span class="text-gold font-semibold mr-1">${num}</span>${text}</p>`);
    span.onclick = () => {
      versesEl.querySelectorAll('p').forEach(p=>p.classList.remove('bg-gold/30'));
      span.classList.add('bg-gold/30');
      selectedQuote = `> "${text}" — ${reading.book} ${reading.chapter}:${num}`;
      const ta = wrap.querySelector('#comment-text');
      if (ta && !ta.disabled){ ta.value = selectedQuote + '\n\n' + ta.value.replace(/^>.*\n\n?/,''); }
    };
    versesEl.appendChild(span);
  });
  body.appendChild(scriptureCard);

  if (reading.audio_url){
    body.appendChild(el(`<div class="card p-3"><iframe class="w-full rounded-xl" height="200" src="${reading.audio_url}" allowfullscreen></iframe></div>`));
  }

  // Read confirmation button
  if (!completed){
    const btn = el(`<button class="w-full bg-primary hover:bg-dark text-white rounded-xl py-4 font-semibold text-lg shadow-soft transition">✅ I've read this</button>`);
    btn.onclick = () => { markReadingComplete(member, reading); render(); };
    body.appendChild(btn);
  } else {
    body.appendChild(el(`<div class="w-full bg-success/10 text-success rounded-xl py-4 font-semibold text-lg text-center">✅ You've completed today's reading</div>`));
  }

  // Reflection prompt
  body.appendChild(el(`<p class="font-display text-xl text-dark">What stood out to you from today's reading?</p>`));

  // Comment box
  const locked = !completed;
  const anonId = uid();
  const commentBox = el(`
    <div class="card p-4 space-y-3 ${locked?'opacity-60':''}">
      <textarea id="comment-text" ${locked?'disabled':''} placeholder="${locked? "Tap 'I've read this' to unlock reflections" : 'Share your reflection...'}" class="w-full border border-light rounded-xl px-3 py-2 outline-none focus:border-primary text-sm h-24"></textarea>
      <div class="flex items-center justify-between">
        <label class="flex items-center gap-2 text-xs text-muted"><input type="checkbox" id="anon-toggle-${anonId}" ${locked?'disabled':''}/> Post anonymously 🔒</label>
        <button id="post-comment-${anonId}" ${locked?'disabled':''} class="bg-primary disabled:opacity-50 text-white text-sm font-semibold px-4 py-2 rounded-xl">Post</button>
      </div>
    </div>`);
  if (!locked){
    commentBox.querySelector(`#post-comment-${anonId}`).onclick = () => {
      const ta = commentBox.querySelector('#comment-text');
      const content = ta.value.trim();
      if (!content){ toast('Write something before posting', 'error'); return; }
      const isAnon = commentBox.querySelector(`#anon-toggle-${anonId}`).checked;
      const quoted = content.startsWith('>') ? content.split('\n')[0].replace(/^>\s*/,'') : null;
      db.comments.push({
        id: uid(), member_id: member.id, reading_id: reading.id,
        content, quoted_verse: quoted, is_anonymous: isAnon, is_pinned:false, created_at: new Date().toISOString()
      });
      const sc = ensureMonthlyScore(member.id, monthKey());
      // first word badge
      const memberCommentsCount = db.comments.filter(c=>c.member_id===member.id).length;
      if (memberCommentsCount === 1) awardBadge(member.id, 'First Word');
      saveDB(db);
      toast('Reflection posted 💜');
      render();
    };
  }
  body.appendChild(commentBox);

  // Comments list
  body.appendChild(el(`<p class="font-display text-xl text-dark pt-2">Community Reflections</p>`));
  const readingComments = db.comments.filter(c=>c.reading_id===reading.id);
  const pinned = readingComments.filter(c=>c.is_pinned);
  const rest = readingComments.filter(c=>!c.is_pinned).sort((a,b)=> new Date(b.created_at)-new Date(a.created_at));
  const ordered = [...pinned, ...rest];

  if (ordered.length === 0){
    body.appendChild(el(`<div class="card p-6 text-center text-muted text-sm">No reflections yet today — be the first to share 💜</div>`));
  } else {
    const list = el(`<div class="space-y-4"></div>`);
    ordered.forEach(c => list.appendChild(commentCard(c, member)));
    body.appendChild(list);
  }

  wrap.appendChild(body);
  return wrap;
});

function markReadingComplete(member, reading){
  const today = todayISO();
  const streak = ensureStreak(member.id);
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
  const yISO = yesterday.toISOString().slice(0,10);

  if (streak.last_active_date === today) return; // already done

  if (streak.last_active_date === yISO){ streak.current_streak += 1; }
  else { streak.current_streak = 1; }
  streak.last_active_date = today;
  streak.total_days_completed += 1;
  if (streak.current_streak > streak.longest_streak) streak.longest_streak = streak.current_streak;

  if (streak.current_streak >= 7) awardBadge(member.id, 'On Fire');
  if (streak.current_streak >= 21) awardBadge(member.id, 'Unbreakable');

  db.reading_completions.push({ id: uid(), member_id: member.id, reading_id: reading.id, completed_at: new Date().toISOString(), month: monthKey() });

  const sc = ensureMonthlyScore(member.id, monthKey());
  sc.comment_points += 5;

  // weekly completion bonus: naive check — last 7 calendar days all completed
  const last7 = [...Array(7)].map((_,i)=>{ const d=new Date(); d.setDate(d.getDate()-i); return d.toISOString().slice(0,10); });
  const completedDates = new Set(db.reading_completions.filter(c=>c.member_id===member.id).map(c=>c.completed_at.slice(0,10)));
  if (last7.every(d=>completedDates.has(d))) sc.weekly_completion_bonus += 10;

  if (streak.current_streak % 7 === 0) sc.streak_bonus += 10;

  const dim = daysInMonth();
  const completedThisMonth = db.reading_completions.filter(c=>c.member_id===member.id && c.month===monthKey()).length;
  if (completedThisMonth === dim){
    sc.full_month_bonus += 30;
    awardBadge(member.id, 'Faithful Finisher');
  }

  recalcTotal(sc);
  saveDB(db);
  toast('Reading complete! Streak updated 🔥');
}

function commentCard(c, currentMember){
  const author = c.is_anonymous ? 'Anonymous Sister' : (db.members.find(m=>m.id===c.member_id)?.name || 'Member');
  const reactionTypes = ['🙏','❤️','🔥','💡'];
  const card = el(`
    <div class="card p-4 space-y-2">
      ${c.is_pinned? `<p class="text-xs text-gold font-semibold">📌 Pinned Reflection</p>`:''}
      <div class="flex justify-between items-baseline">
        <p class="font-semibold text-sm text-dark">${author}</p>
        <p class="text-xs text-muted">${timeAgo(c.created_at)}</p>
      </div>
      ${c.quoted_verse? `<p class="text-xs italic text-primary bg-light rounded-lg px-3 py-2">${c.quoted_verse}</p>`:''}
      <p class="text-sm text-ink">${c.content.replace(/^>.*\n\n?/,'')}</p>
      <div class="flex gap-2 pt-1" id="reactions-${c.id}"></div>
      <div id="replies-${c.id}"></div>
    </div>`);

  const reactionRow = card.querySelector(`#reactions-${c.id}`);
  reactionTypes.forEach(type=>{
    const count = db.reactions.filter(r=>r.comment_id===c.id && r.type===type).length;
    const mine = db.reactions.find(r=>r.comment_id===c.id && r.type===type && r.member_id===currentMember.id);
    const btn = el(`<button class="text-xs px-2 py-1 rounded-full ${mine?'bg-light text-primary':'bg-bg text-muted'} border border-light">${type} ${count>0?count:''}</button>`);
    btn.onclick = () => {
      if (mine){
        db.reactions = db.reactions.filter(r=>r.id!==mine.id);
      } else {
        db.reactions.push({ id: uid(), comment_id: c.id, member_id: currentMember.id, type, created_at: new Date().toISOString() });
        if (c.member_id && c.member_id !== currentMember.id){
          const sc = ensureMonthlyScore(c.member_id, monthKey());
          sc.reaction_received_points += 1; recalcTotal(sc);
          const totalReceived = db.reactions.filter(r=>{
            const com = db.comments.find(cm=>cm.id===r.comment_id);
            return com && com.member_id === c.member_id;
          }).length;
          if (totalReceived >= 10) awardBadge(c.member_id, 'Encouraged Others');
        }
        const mySc = ensureMonthlyScore(currentMember.id, monthKey());
        mySc.reaction_given_points += 1; recalcTotal(mySc);
      }
      saveDB(db);
      render();
    };
    reactionRow.appendChild(btn);
  });

  // replies
  const repliesWrap = card.querySelector(`#replies-${c.id}`);
  const replies = db.replies.filter(r=>r.comment_id===c.id);
  const toggle = el(`<button class="text-xs text-primary font-medium mt-1">${replies.length} repl${replies.length===1?'y':'ies'} ${replies.length?'▾':''}</button>`);
  const list = el(`<div class="hidden mt-2 space-y-2 pl-3 border-l-2 border-light"></div>`);
  replies.forEach(r=>{
    const rAuthor = r.is_anonymous ? 'Anonymous Sister' : (db.members.find(m=>m.id===r.member_id)?.name || 'Member');
    list.appendChild(el(`<div class="text-xs"><span class="font-semibold text-dark">${rAuthor}:</span> <span class="text-ink">${r.content}</span> <span class="text-muted">· ${timeAgo(r.created_at)}</span></div>`));
  });
  const replyForm = el(`
    <div class="flex gap-2 mt-2">
      <input class="flex-1 border border-light rounded-lg px-2 py-1 text-xs outline-none focus:border-primary" placeholder="Write a reply..." />
      <button class="bg-primary text-white text-xs px-3 py-1 rounded-lg">Send</button>
    </div>`);
  const input = replyForm.querySelector('input');
  replyForm.querySelector('button').onclick = () => {
    const val = input.value.trim();
    if (!val) return;
    db.replies.push({ id: uid(), comment_id: c.id, member_id: currentMember.id, content: val, is_anonymous: false, created_at: new Date().toISOString() });
    saveDB(db); render();
  };
  list.appendChild(replyForm);
  toggle.onclick = () => list.classList.toggle('hidden');
  repliesWrap.appendChild(toggle);
  repliesWrap.appendChild(list);

  return card;
}

route('/journey', (session) => {

  const wrap = el(`<div class="fade-in"></div>`);
  wrap.appendChild(header('My Journey'));
  const body = el(`<div class="px-6 space-y-6"></div>`);

  // Calendar state
  let viewDate = new Date();
  const calCard = el(`<div class="card p-4"></div>`);
  function renderCal(){
    calCard.innerHTML = '';
    const monthLabel = viewDate.toLocaleString('default',{month:'long', year:'numeric'});
    const head = el(`
      <div class="flex justify-between items-center mb-3">
        <button id="prev-m" class="text-primary px-2">←</button>
        <p class="font-semibold text-sm text-dark">${monthLabel}</p>
        <button id="next-m" class="text-primary px-2">→</button>
      </div>`);
    calCard.appendChild(head);
    const grid = el(`<div class="grid grid-cols-7 gap-1"></div>`);
    const dim = new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 0).getDate();
    const completions = db.reading_completions.filter(c=>c.member_id===member.id);
    const comments = db.comments.filter(c=>c.member_id===member.id);
    for (let d=1; d<=dim; d++){
      const dateStr = new Date(viewDate.getFullYear(), viewDate.getMonth(), d).toISOString().slice(0,10);
      const did = completions.some(c=>c.completed_at.slice(0,10)===dateStr);
      const commented = comments.some(c=>c.created_at.slice(0,10)===dateStr && db.monthly_readings.find(r=>r.id===c.reading_id)?.day===dateStr);
      let cls = 'bg-light';
      if (did && commented) cls = 'bg-primary';
      else if (did) cls = 'bg-primary/40';
      grid.appendChild(el(`<div class="day-cell ${cls}" title="${dateStr}"></div>`));
    }
    calCard.appendChild(grid);
    calCard.appendChild(el(`<div class="flex gap-3 text-[10px] text-muted mt-3"><span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-light inline-block"></span>No activity</span><span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-primary/40 inline-block"></span>Read</span><span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-primary inline-block"></span>Read + commented</span></div>`));
    calCard.querySelector('#prev-m').onclick = () => { viewDate.setMonth(viewDate.getMonth()-1); renderCal(); };
    calCard.querySelector('#next-m').onclick = () => { viewDate.setMonth(viewDate.getMonth()+1); renderCal(); };
  }
  renderCal();
  body.appendChild(calCard);

  // Personal bests
  const myComments = db.comments.filter(c=>c.member_id===member.id);
  const myReactionsReceived = db.reactions.filter(r=>{
    const c = db.comments.find(cm=>cm.id===r.comment_id);
    return c && c.member_id === member.id;
  }).length;
  const completionsByMonth = {};
  db.reading_completions.filter(c=>c.member_id===member.id).forEach(c=>{ completionsByMonth[c.month] = (completionsByMonth[c.month]||0)+1; });
  const mostActiveMonth = Object.entries(completionsByMonth).sort((a,b)=>b[1]-a[1])[0];

  body.appendChild(el(`
    <div>
      <p class="font-display text-xl text-dark mb-2">Personal Bests</p>
      <div class="grid grid-cols-2 gap-3">
        <div class="card p-4"><p class="text-2xl font-bold text-primary">${streak.longest_streak}</p><p class="text-xs text-muted">Longest streak</p></div>
        <div class="card p-4"><p class="text-2xl font-bold text-primary">${mostActiveMonth? mostActiveMonth[1] : 0}</p><p class="text-xs text-muted">Most active month ${mostActiveMonth? `(${mostActiveMonth[0]})`:''}</p></div>
        <div class="card p-4"><p class="text-2xl font-bold text-primary">${streak.total_days_completed}</p><p class="text-xs text-muted">Total days completed</p></div>
        <div class="card p-4"><p class="text-2xl font-bold text-primary">${myComments.length}</p><p class="text-xs text-muted">Total comments</p></div>
        <div class="card p-4 col-span-2"><p class="text-2xl font-bold text-primary">${myReactionsReceived}</p><p class="text-xs text-muted">Total reactions received</p></div>
      </div>
    </div>`));

  body.appendChild(el(`<p class="font-display text-xl text-dark pt-2">Monthly Scores</p>`));

route('/leaderboard', (session) => {
  const member = db.members.find(m=>m.id===session.id);
  const wrap = el(`<div class="fade-in"></div>`);
  wrap.appendChild(header('Leaderboard'));
  const tabs = el(`
    <div class="px-6 flex gap-2 mb-4">
      <button id="tab-month" class="flex-1 py-2 rounded-xl text-sm font-semibold bg-primary text-white">This Month</button>
      <button id="tab-hof" class="flex-1 py-2 rounded-xl text-sm font-semibold bg-light text-primary">Hall of Fame</button>
    </div>`);
  const body = el(`<div class="px-6"></div>`);
  wrap.appendChild(tabs); wrap.appendChild(body);

  function showMonth(){
    tabs.querySelector('#tab-month').className = "flex-1 py-2 rounded-xl text-sm font-semibold bg-primary text-white";
    tabs.querySelector('#tab-hof').className = "flex-1 py-2 rounded-xl text-sm font-semibold bg-light text-primary";
    body.innerHTML = '';
    const month = monthKey();
    const dim = daysInMonth();
    db.members.forEach(m=>ensureMonthlyScore(m.id, month));
    const ranked = db.monthly_scores.filter(s=>s.month===month).sort((a,b)=>b.total-a.total);
    if (!ranked.length){
      body.appendChild(el(`<div class="card p-6 text-center text-muted text-sm">No scores yet this month — be the first to read! 💜</div>`));
      return;
    }
    const list = el(`<div class="space-y-2"></div>`);
    ranked.forEach((s, i)=>{
      const m = db.members.find(mm=>mm.id===s.member_id);
      if (!m) return;
      const streak = ensureStreak(m.id);
      const completed = db.reading_completions.filter(c=>c.member_id===m.id && c.month===month).length;
      const isMe = m.id === member.id;
      const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':null;
      list.appendChild(el(`
        <div class="card p-3 flex items-center gap-3 ${isMe?'border-2 border-primary':''} ${i<3?'bg-gradient-to-r from-light to-white':''}">
          <div class="w-8 text-center font-bold text-primary">${medal || (i+1)}</div>
          <div class="flex-1">
            <p class="text-sm font-semibold text-dark">${m.name} ${isMe?'(You)':''}</p>
            <p class="text-xs text-muted">${completed}/${dim} days · 🔥 ${streak.current_streak}</p>
          </div>
          <div class="font-bold text-primary">${s.total}</div>
        </div>`));
    });
    body.appendChild(list);
  }

  function showHOF(){
    tabs.querySelector('#tab-hof').className = "flex-1 py-2 rounded-xl text-sm font-semibold bg-primary text-white";
    tabs.querySelector('#tab-month').className = "flex-1 py-2 rounded-xl text-sm font-semibold bg-light text-primary";
    body.innerHTML = '';
    const winners = [...db.monthly_winners].sort((a,b)=>b.month.localeCompare(a.month));
    if (!winners.length){
      body.appendChild(el(`<div class="card p-6 text-center text-muted text-sm">No champions crowned yet — the first Hall of Fame entry could be you 👑</div>`));
      return;
    }
    const list = el(`<div class="space-y-2 max-h-[60vh] overflow-y-auto scrollbar-thin"></div>`);
    winners.forEach(w=>{
      const m = db.members.find(mm=>mm.id===w.member_id);
      list.appendChild(el(`
        <div class="card p-4 flex items-center gap-3">
          <span class="text-2xl">👑</span>
          <div class="flex-1">
            <p class="text-sm font-semibold text-dark">${m? m.name : 'Member'}</p>
            <p class="text-xs text-muted">${w.month} · ${w.total_score} points</p>
          </div>
        </div>`));
    });
    body.appendChild(list);
  }

  tabs.querySelector('#tab-month').onclick = showMonth;
  tabs.querySelector('#tab-hof').onclick = showHOF;
  showMonth();
  return wrap;
});

    <div class="card p-4 space-y-2">
      <textarea id="csv-text" placeholder="Code,Name,Email,Phone,Location,Attendance Score,Years Attended" class="w-full border border-light rounded-xl px-3 py-2 text-sm h-32"></textarea>
      <button id="csv-import" class="bg-primary text-white text-sm font-semibold px-4 py-2 rounded-xl w-full">Import</button>
      <p id="import-result" class="text-xs text-muted"></p>
    </div>`);
  form.querySelector('#csv-import').onclick = () => {
    const lines = form.querySelector('#csv-text').value.trim().split('\n').filter(Boolean);
    let imported=0, skipped=0, errors=0;
    lines.forEach(line=>{
      const parts = line.split(',').map(s=>s.trim());
      if (parts.length < 2){ errors++; return; }
      const [code, name, email, phone, location, score, years] = parts;
      if (db.members.find(m=>m.membership_code.toLowerCase()===code.toLowerCase())){ skipped++; return; }
      db.members.push({ id: uid(), membership_code: code, name, email: email||'', phone: phone||'', location: location||'', attendance_score: parseInt(score)||0, years_attended: years||'', pin:null, first_login:true, created_at: new Date().toISOString() });
      imported++;
    });
    saveDB(db);
    form.querySelector('#import-result').textContent = `${imported} imported, ${skipped} skipped, ${errors} errors`;
    toast('Import complete');
  };
  body.appendChild(form);
  wrap.appendChild(body);
  return wrap;
});

render();
</script>
</body>
</html>
